# ─── CD Pipeline ───
# Runs on merge to main: build + push images, deploy to staging, smoke test, promote to production.

name: CD

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/cos-aa
  PYTHON_VERSION: "3.11"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: api
            dockerfile: infra/docker/Dockerfile.api
          - name: hub
            dockerfile: infra/docker/Dockerfile.hub
          - name: agent-base
            dockerfile: infra/docker/Dockerfile.agent-base
          - name: worker
            dockerfile: infra/docker/Dockerfile.worker
          - name: frontend
            dockerfile: infra/docker/Dockerfile.frontend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.image.name }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.image.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name cos-aa-staging --region us-east-1

      - name: Deploy API
        run: |
          helm upgrade --install cos-aa-api infra/helm/cos-aa-api/ \
            --set image.tag=${{ github.sha }} \
            --namespace cos-aa-staging \
            --create-namespace \
            --wait --timeout 300s

      - name: Deploy Hub
        run: |
          helm upgrade --install cos-aa-hub infra/helm/cos-aa-hub/ \
            --set image.tag=${{ github.sha }} \
            --namespace cos-aa-staging \
            --wait --timeout 300s

      - name: Deploy Agents
        run: |
          helm upgrade --install cos-aa-agents infra/helm/cos-aa-agents/ \
            --set image.tag=${{ github.sha }} \
            --namespace cos-aa-staging \
            --wait --timeout 300s

      - name: Deploy Worker
        run: |
          helm upgrade --install cos-aa-worker infra/helm/cos-aa-worker/ \
            --set image.tag=${{ github.sha }} \
            --namespace cos-aa-staging \
            --wait --timeout 300s

      - name: Deploy Memory
        run: |
          helm upgrade --install cos-aa-memory infra/helm/cos-aa-memory/ \
            --set image.tag=${{ github.sha }} \
            --namespace cos-aa-staging \
            --wait --timeout 300s

      - name: Deploy Frontend
        run: |
          helm upgrade --install cos-aa-frontend infra/helm/cos-aa-frontend/ \
            --set image.tag=${{ github.sha }} \
            --namespace cos-aa-staging \
            --wait --timeout 300s

  smoke-test:
    name: Smoke Tests (Staging)
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://api.staging.cos-aa.<YOUR_DOMAIN>/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 10
          done
          echo "Health check failed after 30 attempts"
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install ".[all]"
          pip install pytest pytest-asyncio

      - name: Run E2E tests against staging
        env:
          COS_AA_BASE_URL: https://api.staging.cos-aa.<YOUR_DOMAIN>
          COS_AA_TEST_TOKEN: ${{ secrets.STAGING_TEST_TOKEN }}
        run: pytest tests/e2e/ -v --tb=short

  promote-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: smoke-test
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name cos-aa-production --region us-east-1

      - name: Deploy all services
        run: |
          for chart in api hub agents worker memory frontend; do
            helm upgrade --install cos-aa-${chart} infra/helm/cos-aa-${chart}/ \
              --set image.tag=${{ github.sha }} \
              --namespace cos-aa-production \
              --create-namespace \
              --wait --timeout 600s
          done

      - name: Post-deploy health check
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://api.cos-aa.<YOUR_DOMAIN>/health)
          if [ "$STATUS" != "200" ]; then
            echo "CRITICAL: Production health check failed (status=$STATUS)"
            exit 1
          fi
          echo "Production deployment healthy"

      - name: Notify success
        if: success()
        run: echo "Production deployment of ${{ github.sha }} completed successfully"

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yaml"

scrape_configs:
  - job_name: "cos-aa-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["cos-aa-api:8000"]
        labels:
          service: "api"

  - job_name: "cos-aa-hub"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["cos-aa-hub:9100"]
        labels:
          service: "hub"

  - job_name: "cos-aa-agents"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["cos-aa-agent-planning:9100", "cos-aa-agent-learning:9100", "cos-aa-agent-monitoring:9100", "cos-aa-agent-knowledge:9100"]
        labels:
          service: "agents"

  - job_name: "cos-aa-memory"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["cos-aa-memory:50051"]
        labels:
          service: "memory"

replicaCount: 2

image:
  repository: ghcr.io/<GITHUB_ORG>/cos-aa-frontend
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: app.cos-aa.<YOUR_DOMAIN>
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: cos-aa-frontend-tls
      hosts:
        - app.cos-aa.<YOUR_DOMAIN>

resources:
  limits:
    cpu: "250m"
    memory: "128Mi"
  requests:
    cpu: "50m"
    memory: "64Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

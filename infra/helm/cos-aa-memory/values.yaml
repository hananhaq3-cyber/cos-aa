replicaCount: 2

image:
  repository: ghcr.io/<GITHUB_ORG>/cos-aa-memory
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 50051

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

env:
  - name: APP_ENV
    value: "production"
  - name: POSTGRES_URL
    valueFrom:
      secretKeyRef:
        name: cos-aa-secrets
        key: postgres-url
  - name: REDIS_URL
    valueFrom:
      secretKeyRef:
        name: cos-aa-secrets
        key: redis-url
  - name: CHROMA_HOST
    value: "chromadb-service"
  - name: CHROMA_PORT
    value: "8000"
  - name: OTLP_ENDPOINT
    value: "http://jaeger-collector:4317"

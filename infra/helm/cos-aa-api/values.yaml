replicaCount: 2

image:
  repository: ghcr.io/<GITHUB_ORG>/cos-aa-api
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
  hosts:
    - host: api.cos-aa.<YOUR_DOMAIN>
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: cos-aa-api-tls
      hosts:
        - api.cos-aa.<YOUR_DOMAIN>

resources:
  limits:
    cpu: "1000m"
    memory: "1Gi"
  requests:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

env:
  - name: APP_ENV
    value: "production"
  - name: LOG_LEVEL
    value: "INFO"
  - name: POSTGRES_URL
    valueFrom:
      secretKeyRef:
        name: cos-aa-secrets
        key: postgres-url
  - name: REDIS_URL
    valueFrom:
      secretKeyRef:
        name: cos-aa-secrets
        key: redis-url
  - name: OPENAI_API_KEY
    valueFrom:
      secretKeyRef:
        name: cos-aa-secrets
        key: openai-api-key
  - name: JWT_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: cos-aa-secrets
        key: jwt-secret-key
  - name: VAULT_ADDR
    value: "https://vault.internal:8200"
  - name: OTLP_ENDPOINT
    value: "http://jaeger-collector:4317"

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

nodeSelector: {}
tolerations: []
affinity: {}
